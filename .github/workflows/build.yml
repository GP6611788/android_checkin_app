name: Build Android Checkin APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build_apk:
    runs-on: ubuntu-latest
    env:
      PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple
      BUILDOZER_ANDROID_HOME: ${{ github.workspace }}/android-sdk
    steps:
      - name: 拉取仓库源码
        uses: actions/checkout@v4

      # 切换阿里云Ubuntu镜像源，并添加backports源解决libtinfo5缺失
      - name: 切换国内软件源
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
          echo "deb http://mirrors.aliyun.com/ubuntu/ noble-backports main universe" | sudo tee -a /etc/apt/sources.list
          sudo apt clean
          sudo apt update -y

      # 安装系统编译依赖（单独补齐libtinfo5适配Ubuntu24.04）
      - name: 安装Buildozer编译依赖
        run: |
          sudo apt install -y libtinfo5 git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip3 install --upgrade buildozer

      # 确保资源文件夹存在
      - name: 创建资源文件夹data
        run: mkdir -p data

      # 打印配置校验语法
      - name: 校验buildozer.spec配置文件
        run: cat buildozer.spec

      # 带详细日志执行编译，失败不终止流程以导出日志
      - name: 执行APK编译
        run: |
          buildozer android debug --log-level 2
        continue-on-error: true

      # 导出完整构建日志
      - name: 导出完整错误日志
        run: |
          ls -la .buildozer/logs/
          cat .buildozer/logs/build.log > build_error_log.txt || echo "未生成构建日志"

      # 上传APK安装包 + 错误日志文件
      - name: 上传产物与日志
        uses: actions/upload-artifact@v4
        with:
          path: |
            bin/*.apk
            build_error_log.txt
          name: APK打包产物与错误日志